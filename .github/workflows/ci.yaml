name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["*"]

jobs:
  prepare:
    name: Setup & Codegen
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Cache Dart/Flutter
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            build
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: .

  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workspace

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Check formatting (fast fail)
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workspace

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Run tests
        run: flutter test --no-pub
